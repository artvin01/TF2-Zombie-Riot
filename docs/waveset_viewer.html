<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="static/css/waves.css">
        <link rel="icon" href="favicon.ico"/>
        <script src="static/js/waves.js" defer></script>
        <script src="static/js/audioplayer.js"></script>
        <script src="static/js/morecolors.js"></script>
        <title>ZR Encyclopedia - Unknown waveset</title>
    </head>
    <body>
        <div class="waveset_bg">
            <!-- Header -->
            <h1 id="wavesetname">Unknown waveset</h1>
            <div class="flex_break"></div>
            <h2 id="wave_progress_text">WAVE <input type="number" min="1" max="40" value="1" onchange="set_wave(this.value);">/ <span>40</span></h2>
            <div class="flex_break"></div>
            <div class="wave_btn" tabindex="0" onclick="cycle_wave(-1);">&lt;</div>
            <div id="wave_progress_bar" onclick="wavebar_setprogress(event);">
                <div style="pointer-events:none;"></div>
            </div>
            <div class="wave_btn" tabindex="0" onclick="cycle_wave(1);">&gt;</div>
            <div class="flex_break" style="margin-bottom: 1em;"></div>
            <!-- Body -->
            <div id="npc_container">
                <img src="static/img/loader.svg" class="rotating">
            </div>

            <div class="flex_break"></div>
            <div id="wave_music_container"></div>
            <div class="flex_break"></div>
            <div id="wave_info_container"></div>
        </div>

        <div class="waveset_bg hidden">
            <h2>Waveset Information</h2>
            <div class="flex_break"></div>
            <div id="waveset_info"></div>
        </div>

        <div class="waveset_bg hidden">
            <h2>Music Player</h2>
            <div class="flex_break"></div>
            <div id="music_title"></div>
            <div class="flex_break"></div>
            <div id="music_player"></div>
        </div>
    </body>
</html>
