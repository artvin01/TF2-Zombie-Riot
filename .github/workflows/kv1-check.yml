name: Check KeyValues1 syntax
on:
  push:
    branches:
    - 'master'
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Setup venv
      run: python -m venv venv; ./venv/bin/pip install vdf==3.4

    - name: Fetch syntax checker
      run: wget https://raw.githubusercontent.com/artvin01/TF2-Zombie-Riot/refs/heads/wiki_gen/trcheck.py

    - name: Check syntax
      run: ./venv/bin/python trcheck.py