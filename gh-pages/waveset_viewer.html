<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/waves.css">
    <script src="static/waves.js" defer></script>
    <title>ZR Encyclopedia - Unknown waveset</title>
</head>
<body>
    <div id="waveset_data_bg">
        <!-- Header -->
        <h2 id="wavesetname"></h2>
        <div class="flex_break"></div>

        <img src="static/link.svg" id="wave_embed_link" tabindex="0" onclick="copy_waveset_embed_link();">
        <div class="flex_break"></div>
        <div class="wave_btn" tabindex="0" onclick="cycle_wave(-1);"><</div>
        <div id="wave_progress_bar">
            <div style="pointer-events:none;"></div>
        </div>
        <div class="wave_btn" tabindex="0" onclick="cycle_wave(1);">></div>
        <div class="flex_break" style="margin-bottom: 1em;"></div>
        <!-- Body -->
        <div id="npc_container">

        </div>
</body>
</html>
